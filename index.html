<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineZone | Watch Free Movies & TV Shows</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <button class="mobile-menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰ Menu</button>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <div class="app-container">
        <aside class="sidebar" id="appSidebar">
            <div class="logo">Cine<span>Zone</span></div>
            <nav class="nav-menu">
                <button class="nav-item active" onclick="showSection('home')">🏠 Home</button>
                <button class="nav-item" onclick="showSection('movies')">🎬 Movies</button>
                <button class="nav-item" onclick="showSection('series')">📺 TV & Web Series</button>
            </nav>
            <div class="server-status">Connected to: 172.16.50.14</div>
        </aside>

        <main class="main-content">
            
            <header class="popcorn-header">
                <div class="search-box">
                    <input type="text" id="globalSearch" placeholder="🔍 Search movies, TV shows by title..." oninput="searchLibrary()">
                </div>
            </nav>

            <section class="hero-banner" id="heroBanner">
                <div class="hero-gradient"></div>
                <div class="hero-content">
                    <span class="badge">POPULAR</span>
                    <h1 id="heroTitle">Loading Feature...</h1>
                    <button class="play-btn" id="heroPlayBtn">▶ Play Now</button>
                </div>
            </section>

            <div id="browseContainer">
                <section class="movie-section">
                    <h2 class="section-title">🔥 Trending 2026 Uploads</h2>
                    <div class="horizontal-scroll" id="rowTrending"></div>
                </section>

                <section class="movie-section">
                    <h2 class="section-title">🌴 South Indian Hindi Dubbed</h2>
                    <div class="horizontal-scroll" id="rowSouthHindi"></div>
                </section>

                <section class="movie-section">
                    <h2 class="section-title">⭐ IMDb Top-250 Masterpieces</h2>
                    <div class="horizontal-scroll" id="rowIMDb"></div>
                </section>

                <section class="movie-section">
                    <h2 class="section-title">🧸 Animation Favorites</h2>
                    <div class="horizontal-scroll" id="rowAnimation"></div>
                </section>
            </div>

            <div id="searchContainer" style="display: none;">
                <h2 class="section-title" id="searchTitle">Search Results</h2>
                <div class="media-grid" id="searchGrid"></div>
            </div>

        </main>
    </div>

    <div class="video-modal" id="videoModal">
        <button class="close-modal" onclick="closeVideo()">✕ Close</button>
        <div class="video-container">
            <video id="videoPlayer" controls autoplay></video>
            <h2 id="modalVideoTitle" class="modal-title">Movie Playback</h2>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
